<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom Life — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; }
.app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 1rem; border-bottom: 1px solid #e8e8e4; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 8px; }
.logo { font-size: 18px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.3px; }
.logo span { color: #1D9E75; }
.sync { font-size: 11px; color: #888; }
.filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.filter-bar label { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.filter-bar input { font-size: 12px; padding: 5px 10px; border: 1px solid #e0e0db; border-radius: 8px; background: #fff; color: #1a1a1a; font-family: inherit; }
.filter-bar button { font-size: 12px; padding: 5px 14px; border-radius: 8px; border: 1px solid #1D9E75; background: #1D9E75; color: #fff; cursor: pointer; font-family: inherit; font-weight: 500; }
.filter-bar button.reset { background: #fff; color: #999; border-color: #e0e0db; }
.nav { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.nav-btn { font-size: 12px; padding: 6px 16px; border-radius: 20px; border: 1px solid #e0e0db; background: #fff; color: #666; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.nav-btn:hover { border-color: #1D9E75; color: #1D9E75; }
.nav-btn.active { background: #1D9E75; color: #fff; border-color: #1D9E75; font-weight: 600; }
.section { display: none; }
.section.active { display: block; }
.sec-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.6px; margin: 1.25rem 0 0.75rem; }
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
.kpi { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 14px 16px; }
.kpi-label { font-size: 11px; color: #999; margin-bottom: 6px; }
.kpi-value { font-size: 22px; font-weight: 700; color: #1a1a1a; line-height: 1; }
.kpi-sub { font-size: 11px; color: #999; margin-top: 4px; }
.up { color: #1D9E75; } .down { color: #D85A30; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
.card { background: #fff; border: 1px solid #e8e8e4; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 12px; }
.card-title { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 1rem; }
.tbl { width: 100%; font-size: 12px; border-collapse: collapse; }
.tbl th { color: #999; font-weight: 600; text-align: left; padding: 4px 0 8px; border-bottom: 1px solid #f0f0ec; }
.tbl td { padding: 8px 0; border-bottom: 1px solid #f0f0ec; color: #1a1a1a; vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.badge { display: inline-block; font-size: 10px; padding: 3px 9px; border-radius: 20px; font-weight: 700; }
.b-paid{background:#E1F5EE;color:#0F6E56} .b-pending{background:#FAEEDA;color:#854F0B} .b-cancelled{background:#FCEBEB;color:#A32D2D} .b-open{background:#E6F1FB;color:#185FA5} .b-abandoned{background:#F1EFE8;color:#5F5E5A}
.progress-wrap{width:100%;background:#f0f0ec;border-radius:4px;height:5px;margin-top:3px}
.progress-bar{height:5px;border-radius:4px;background:#1D9E75}
.chart-wrap{position:relative;width:100%}
.loading{text-align:center;padding:4rem 1rem;color:#999;font-size:14px}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#1D9E75;margin:0 3px;animation:bounce 1.2s infinite}
.loading-dot:nth-child(2){animation-delay:0.2s} .loading-dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
.error{background:#FCEBEB;border-radius:12px;padding:14px 18px;font-size:13px;color:#A32D2D;margin-bottom:1rem}
.row-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0ec;font-size:12px}
.row-item:last-child{border-bottom:none}
.avatar{width:30px;height:30px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0F6E56;flex-shrink:0}
.customer-row{display:flex;align-items:center;gap:8px}
.empty{text-align:center;padding:1.5rem;color:#999;font-size:12px}
.login-overlay{position:fixed;inset:0;background:#f9f9f7;display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:#fff;border:1px solid #e8e8e4;border-radius:20px;padding:2.5rem 2rem;width:320px;text-align:center}
.login-logo{font-size:22px;font-weight:700;margin-bottom:0.5rem}
.login-logo span{color:#1D9E75}
.login-sub{font-size:13px;color:#999;margin-bottom:1.5rem}
.login-input{width:100%;padding:10px 14px;border:1px solid #e0e0db;border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:10px;outline:none}
.login-input:focus{border-color:#1D9E75}
.login-btn{width:100%;padding:10px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.login-err{font-size:12px;color:#D85A30;margin-top:8px;display:none}
@media(max-width:540px){.grid2{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">Bloom<span>Life</span></div>
    <div class="login-sub">Ingresá la contraseña para acceder</div>
    <input class="login-input" type="password" id="pwInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-err" id="loginErr">Contraseña incorrecta</div>
  </div>
</div>

<div class="app">
  <div class="header">
    <div class="logo">Bloom<span>Life</span> — Dashboard</div>
    <div class="sync" id="sync-time">Cargando...</div>
  </div>
  <div class="filter-bar">
    <label>Período:</label>
    <input type="date" id="dateFrom">
    <span style="font-size:12px;color:#999">hasta</span>
    <input type="date" id="dateTo">
    <button onclick="applyFilter()">Aplicar</button>
    <button class="reset" onclick="resetFilter()">Ver todo</button>
    <span id="filter-active" style="font-size:11px;color:#1D9E75;display:none">● Filtro activo</span>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showSection('resumen')">Resumen</button>
    <button class="nav-btn" onclick="showSection('ventas')">Ventas</button>
    <button class="nav-btn" onclick="showSection('productos')">Productos</button>
    <button class="nav-btn" onclick="showSection('clientes')">Clientes</button>
    <button class="nav-btn" onclick="showSection('recompra')">Recompra</button>
    <button class="nav-btn" onclick="showSection('canales')">Canales</button>
    <button class="nav-btn" onclick="showSection('pedidos')">Pedidos</button>
  </div>
  <div id="main"><div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div><p style="margin-top:1rem">Conectando con Tienda Nube...</p></div></div>
</div>

<script>
const PROXY='';
const PASSWORD='bloom2026';
let ALL_ORDERS=[], ALL_PRODUCTS=[], FILTERED_ORDERS=[];
let CHARTS={};

// AUTH
function doLogin(){
  const v=document.getElementById('pwInput').value;
  if(v===PASSWORD){sessionStorage.setItem('bl_auth','ok');document.getElementById('loginOverlay').style.display='none';init();}
  else{document.getElementById('loginErr').style.display='block';}
}
window.addEventListener('DOMContentLoaded',()=>{
  if(sessionStorage.getItem('bl_auth')==='ok'){document.getElementById('loginOverlay').style.display='none';init();}
});

// UTILS
function fmt(n){return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n||0);}
function fmtN(n){return new Intl.NumberFormat('es-AR').format(Math.round(n||0));}
function getName(o){if(!o)return'—';if(typeof o==='string')return o;return o.es||o.en||Object.values(o)[0]||'—';}
function initials(n){if(!n)return'?';return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function statusBadge(s){const m={paid:['Pagado','b-paid'],pending:['Pendiente','b-pending'],cancelled:['Cancelado','b-cancelled'],open:['Abierto','b-open'],voided:['Anulado','b-cancelled'],refunded:['Reembolsado','b-cancelled'],abandoned:['Abandonado','b-abandoned']};const[l,c]=m[s]||[s,'b-pending'];return`<span class="badge ${c}">${l}</span>`;}
function mkChart(id,type,labels,datasets,opts){if(CHARTS[id])CHARTS[id].destroy();const ctx=document.getElementById(id);if(!ctx)return;CHARTS[id]=new Chart(ctx,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},...(opts?.plugins||{})},...opts}});}
function tickY(v){if(v>=1000000)return'$'+(v/1000000).toFixed(1)+'M';if(v>=1000)return'$'+(v/1000).toFixed(0)+'k';return'$'+v;}

// FILTER
function applyFilter(){
  const from=document.getElementById('dateFrom').value;
  const to=document.getElementById('dateTo').value;
  if(!from&&!to){resetFilter();return;}
  FILTERED_ORDERS=ALL_ORDERS.filter(o=>{
    const d=new Date(o.created_at);
    if(from&&d<new Date(from))return false;
    if(to&&d>new Date(to+'T23:59:59'))return false;
    return true;
  });
  document.getElementById('filter-active').style.display='inline';
  renderAll();
}
function resetFilter(){
  FILTERED_ORDERS=[...ALL_ORDERS];
  document.getElementById('dateFrom').value='';
  document.getElementById('dateTo').value='';
  document.getElementById('filter-active').style.display='none';
  renderAll();
}

window.showSection=function(id){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes("'"+id+"'")));
  document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id==='sec-'+id));
};

async function apiFetch(path){const r=await fetch(PROXY+'/api/'+path);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}
async function fetchAll(){let all=[],page=1;while(true){const b=await apiFetch('orders?per_page=200&page='+page);if(!b.length)break;all=all.concat(b);if(b.length<200)break;page++;i
