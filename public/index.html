.cf-row.out{color:#D85A30}

.signal-card{background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:16px 18px;position:relative;overflow:hidden}

.signal-card.good::before{background:#1D9E75}

.signal-value{font-size:26px;font-weight:800;color:#1a1a1a;line-height:1;margin-bottom:4px}

.signal-rule{font-size:10px;margin-top:6px;padding:3px 8px;border-radius:20px;display:inline-block;font-weight:600}

@media(max-width:540px){.grid2{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.nav-group-label{display:none}.mktg-line{grid-template-columns:1fr 1fr 1fr;}.mktg-line span:first-child{grid-column:1/-1;font-weight:600}}

</head>

window.filterB2BProducts = function (query) {
  const list = document.getElementById('b2b-product-list');
  if (!list) return;
  const q = query.toLowerCase().trim();
  if (!q) { list.style.display = 'none'; return; }
  const matches = (window._b2bProducts || []).filter(p => p.nombre.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { list.style.display = 'none'; return; }
  list.style.display = 'block';
  list.innerHTML = matches.map(p => `
    <div onclick="addB2BProduct(${p.id})" style="padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f0ec;display:flex;justify-content:space-between;align-items:center" onmouseover="this.style.background='#f5f5f3'" onmouseout="this.style.background='#fff'">
      <span>${p.nombre}</span>
      <span style="font-size:11px;color:#999;margin-left:8px;white-space:nowrap">${p.stock!==null&&p.stock!==undefined?'Stock: '+p.stock:'sin control'}</span>
    </div>`).join('');
};
 
window.addB2BProduct = function (productId) {
  const p = (window._b2bProducts || []).find(x => x.id === productId);
  if (!p) return;
  if ((window._b2bSelected || []).find(x => x.id === productId)) { document.getElementById('b2b-product-list').style.display='none';document.getElementById('b2b-search').value='';return; }
  window._b2bSelected = window._b2bSelected || [];
  window._b2bSelected.push({ ...p, cantidad: 1, precio: p.precio });
  document.getElementById('b2b-product-list').style.display = 'none';
  document.getElementById('b2b-search').value = '';
  renderB2BSelected();
};
 
window.removeB2BProduct = function (productId) {
  window._b2bSelected = (window._b2bSelected || []).filter(x => x.id !== productId);
  renderB2BSelected();
};
 
window.renderB2BSelected = function () {
  const tbody = document.getElementById('b2b-selected-body');
  const wrap = document.getElementById('b2b-selected-wrap');
  if (!tbody || !wrap) return;
  const selected = window._b2bSelected || [];
  wrap.style.display = selected.length ? 'block' : 'none';
  tbody.innerHTML = selected.map(p => `
    <tr>
      <td style="font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.nombre}</td>
      <td style="text-align:right"><input type="number" min="1" value="${p.cantidad}" style="width:55px;padding:4px 6px;border:1px solid #e0e0db;border-radius:6px;font-size:12px;text-align:right" onchange="updateB2BProduct(${p.id},'cantidad',parseInt(this.value)||1)"></td>
      <td style="text-align:right"><input type="number" min="0" step="100" value="${p.precio}" style="width:105px;padding:4px 6px;border:1px solid #e0e0db;border-radius:6px;font-size:12px;text-align:right" onchange="updateB2BProduct(${p.id},'precio',parseFloat(this.value)||0)"></td>
      <td><button class="btn-danger" onclick="removeB2BProduct(${p.id})">✕</button></td>
    </tr>`).join('');

window.updateB2BProduct = function (productId, field, value) {
  const item = (window._b2bSelected || []).find(x => x.id === productId);
  if (item) item[field] = value;
  updateB2BTotals();
};
 
window.updateB2BTotals = function () {
  const selected = window._b2bSelected || [];
  const total = selected.reduce((s, p) => s + p.precio * p.cantidad, 0);
  const totalDisplay = document.getElementById('b2b-total-display');
  if (totalDisplay) totalDisplay.textContent = fmt(total);
  const facturaA = document.getElementById('b2b-factura-a');
  if (facturaA?.checked) {
    const sinIva = total / 1.21, iva = total - sinIva;
    const s=document.getElementById('b2b-sin-iva'),i=document.getElementById('b2b-iva-monto'),c=document.getElementById('b2b-con-iva');
    if(s)s.textContent=fmt(sinIva);if(i)i.textContent=fmt(iva);if(c)c.textContent=fmt(total);
  }
};
 
window.toggleFacturaA = function () {

window.saveB2B = async function () {
  const selected = window._b2bSelected || [];
  if (!selected.length) { alert('Agregá al menos un producto'); return; }
  const clienteNombre = document.getElementById('b2b-cliente')?.value.trim();
  if (!clienteNombre) { alert('El nombre del cliente es requerido'); return; }
  const clienteEmail = document.getElementById('b2b-email')?.value.trim();
  const status = document.getElementById('b2b-status')?.value;
  const notas = document.getElementById('b2b-notas')?.value.trim();
  const facturaA = document.getElementById('b2b-factura-a')?.checked;
  const canal = document.getElementById('b2b-canal')?.value.trim();
  const totalARS = selected.reduce((s, p) => s + p.precio * p.cantidad, 0);
  const totalUnidades = selected.reduce((s, p) => s + p.cantidad, 0);
  const nombresProductos = selected.map(p => `${p.nombre} x${p.cantidad}`).join(', ');
  const btn = document.getElementById('b2b-submit-btn');
  if (btn) { btn.textContent = 'Creando orden...'; btn.disabled = true; }
  try {
    const payload = {
      cliente: { nombre: clienteNombre, email: clienteEmail },
      productos: selected.map(p => ({variantId: p.variantId, productId: p.id, nombre: p.nombre, cantidad: p.cantidad, precio: p.precio})),
      notas: [notas, facturaA ? 'FACTURA A' : '', canal ? 'Canal: ' + canal : ''].filter(Boolean).join(' | '),
    };
    const r = await fetch('/api/crear-orden-b2b', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const result = await r.json();
    if (!result.ok) { console.error('Error TN:', result.error); alert('Error al crear la orden en Tienda Nube. El registro financiero se guardará igual.'); }
    const entry = {id:uid(),fecha:nowStr(),cliente:clienteNombre,email:clienteEmail,productos:nombresProductos,unidades:totalUnidades,monto:totalARS,status,facturaA,canal,notas,ordenTN:result.orden?.number||null};
    FIN_B2B.push(entry);
    finSave('b2b', FIN_B2B);
    document.getElementById('b2b-modal').remove();
    renderFinB2B();
    alert(result.ok ? `✓ Orden #${result.orden.number} creada en Tienda Nube` : '⚠ Guardado en registro financiero (verificar en Tienda Nube)');
  } catch (e) {
    console.error('Error:', e);
    if (btn) { btn.textContent = 'Crear orden en Tienda Nube'; btn.disabled = false; }
    alert('Error de conexión: ' + e.message);
  }
};

function renderFinMktg(){
  const months=allMonths().slice(-8);
  const tabsEl=document.getElementById('mktg-month-tabs');
  if(!tabsEl)return;
  let am=tabsEl.dataset.active||currentMonth();
  if(!months.includes(am))am=months[months.length-1];
  tabsEl.dataset.active=am;
  tabsEl.innerHTML=months.map(m=>`<button class="month-tab${m===am?' active':''}" onclick="this.parentElement.dataset.active='${m}';renderFinMktg()">${mLabel(m)}</button>`).join('');
  if(!FIN_MKTG[am])FIN_MKTG[am]={};
  const md=FIN_MKTG[am];
  let totalBudget=0,totalActual=0;
  MKTG_STRUCTURE.forEach(({lines})=>lines.forEach(l=>{totalBudget+=parseFloat(md[l+'_b']||0);totalActual+=parseFloat(md[l+'_a']||0);}));
  const variance=totalActual-totalBudget;
  const kpis=document.getElementById('mktg-kpis');
  if(kpis)kpis.innerHTML=`
    <div class="kpi"><div class="kpi-label">Budget total</div><div class="kpi-value">${fmt(totalBudget)}</div><div class="kpi-sub">${mLabel(am)}</div></div>
    <div class="kpi"><div class="kpi-label">Actual total</div><div class="kpi-value">${fmt(totalActual)}</div><div class="kpi-sub">ejecutado</div></div>
    <div class="kpi"><div class="kpi-label">Variación</div><div class="kpi-value ${variance>0?'down':'up'}">${variance>0?'+':''}${fmt(variance)}</div><div class="kpi-sub">${variance>0?'sobre presupuesto':'bajo presupuesto'}</div></div>
    <div class="kpi"><div class="kpi-label">Ejecución</div><div class="kpi-value">${totalBudget?(totalActual/totalBudget*100).toFixed(0)+'%':'—'}</div><div class="kpi-sub">del budget</div></div>`;
  const grpLabels=MKTG_STRUCTURE.map(g=>g.group);
  const grpBudget=MKTG_STRUCTURE.map(({lines})=>Math.round(lines.reduce((s,l)=>s+parseFloat(md[l+'_b']||0),0)));
  const grpActual=MKTG_STRUCTURE.map(({lines})=>Math.round(lines.reduce((s,l)=>s+parseFloat(md[l+'_a']||0),0)));
  mkChart('chartMktgPlan','bar',grpLabels,[
    {label:'Budget',data:grpBudget,backgroundColor:'#B5D4F4',borderRadius:3},
    {label:'Actual',data:grpActual,backgroundColor:'#378ADD',borderRadius:3},
  ],{scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},callback:tickY}}},plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11},boxWidth:10,padding:8}}}});
  let html='';
  MKTG_STRUCTURE.forEach(({group,lines})=>{
    html+=`<div class="mktg-section"><div class="mktg-section-title">${group}</div>
      <div class="mktg-line header"><span>Línea</span><span style="text-align:right">Budget ARS</span><span style="text-align:right">Actual ARS</span><span style="text-align:right">Var.</span></div>`;
    lines.forEach(l=>{
      const b=parseFloat(md[l+'_b']||0),a=parseFloat(md[l+'_a']||0),v=a-b;
      const vClass=v>0?'variance-neg':v<0?'variance-pos':'';
      const vStr=(b||a)?`<span class="${vClass}">${v>0?'+':''}${fmt(v)}</span>`:'—';
      html+=`<div class="mktg-line">
        <span style="color:#555">${l}</span>
        <input class="mktg-input" type="number" data-key="${l}_b" value="${md[l+'_b']||''}" placeholder="0" onchange="FIN_MKTG['${am}']['${l}_b']=parseFloat(this.value)||0">
        <input class="mktg-input" type="number" data-key="${l}_a" value="${md[l+'_a']||''}" placeholder="0" onchange="FIN_MKTG['${am}']['${l}_a']=parseFloat(this.value)||0">
        <span style="text-align:right">${vStr}</span>
      </div>`;
    });
    const gB=lines.reduce((s,l)=>s+parseFloat(md[l+'_b']||0),0),gA=lines.reduce((s,l)=>s+parseFloat(md[l+'_a']||0),0);
    html+=`<div class="mktg-total-row"><span>Total ${group}</span><span style="text-align:right">${fmt(gB)}</span><span style="text-align:right">${fmt(gA)}</span><span></span></div></div>`;
  });
  const tbl=document.getElementById('mktg-plan-table');
  if(tbl)tbl.innerHTML=html;
}

  const tc=FIN_TC;
  const lf=parseFloat(document.getElementById('landed-factor')?.value||FIN_LANDED_FACTOR||2.3);
  const slider=document.getElementById('tc-slider'),tcVal=document.getElementById('tc-val');
  if(slider){slider.value=tc;if(tcVal)tcVal.textContent=tc;}
  const tbody=document.getElementById('costos-tbody');
  if(!tbody)return;
  tbody.innerHTML=FIN_COSTOS.map((c,i)=>{
    const landed=c.fob*tc*lf,margin=c.precio?((c.precio-landed)/c.precio*100).toFixed(1):0;
    const mClass=margin>=70?'b-paid':margin>=50?'b-pending':'b-cancelled';
    return`<tr>
      <td style="font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.sku}</td>
      <td><input class="cost-input-sm" type="number" step="0.01" value="${c.fob}" onchange="FIN_COSTOS[${i}].fob=parseFloat(this.value)||0;recalcCostos()"></td>
      <td style="color:#999">${fmt(Math.round(landed))}</td>
      <td><input class="cost-input-sm" type="number" step="100" value="${c.precio}" onchange="FIN_COSTOS[${i}].precio=parseFloat(this.value)||0;recalcCostos()"></td>
      <td><span class="badge ${mClass}">${margin}%</span></td>
    </tr>`;
  }).join('');
}
 
window.recalcCostos=function(){FIN_TC=parseInt(document.getElementById('tc-slider')?.value||FIN_TC);FIN_LANDED_FACTOR=parseFloat(document.getElementById('landed-factor')?.value||FIN_LANDED_FACTOR||2.3);renderFinCostos();};
window.saveCostos=function(){FIN_TC=parseInt(document.getElementById('tc-slider')?.value||FIN_TC);FIN_LANDED_FACTOR=parseFloat(document.getElementById('landed-factor')?.value||FIN_LANDED_FACTOR||2.3);finSave('costos',FIN_COSTOS);finSave('tc',FIN_TC);finSave('landedfactor',FIN_LANDED_FACTOR);if(document.getElementById('sec-finanzas')?.classList.contains('active'))renderFinPL();alert('Costos guardados ✓');};
 
function renderFinProv(){
  const pending=FIN_PROV.filter(p=>p.status==='Pendiente');
  const totalPen=pending.reduce((s,p)=>s+parseFloat(p.monto||0),0);
  const totalAll=FIN_PROV.reduce((s,p)=>s+parseFloat(p.monto||0),0);
  const overdue=pending.filter(p=>p.vence&&new Date(p.vence)<new Date());
  const kpis=document.getElementById('prov-kpis');
  if(kpis)kpis.innerHTML=`
    <div class="kpi"><div class="kpi-label">Total pendiente</div><div class="kpi-value down">${fmt(totalPen)}</div><div class="kpi-sub">${fmtN(pending.length)} facturas</div></div>
    <div class="kpi"><div class="kpi-label">Vencidas</div><div class="kpi-value${overdue.length?' down':''}">${fmtN(overdue.length)}</div><div class="kpi-sub">${fmt(overdue.reduce((s,p)=>s+parseFloat(p.monto||0),0))}</div></div>
    <div class="kpi"><div class="kpi-label">Total registrado</div><div class="kpi-value">${fmt(totalAll)}</div><div class="kpi-sub">${fmtN(FIN_PROV.length)} facturas</div></div>`;
  const pendEl=document.getElementById('prov-pending');
  if(pendEl){
    if(!pending.length){pendEl.innerHTML='<div class="card"><div class="empty">✓ Sin facturas pendientes</div></div>';}
    else pendEl.innerHTML=pending.sort((a,b)=>(a.vence||'9999')>(b.vence||'9999')?1:-1).map(p=>{
      const isOverdue=p.vence&&new Date(p.vence)<new Date();
      return`<div class="stock-alert ${isOverdue?'critical':'warn'}">
        <div><div style="font-weight:600">${p.proveedor}</div><div style="font-size:11px;margin-top:2px">${p.concepto||'—'}${p.notas?' · '+p.notas:''}</div></div>
        <div style="text-align:right"><div style="font-weight:700">${fmt(parseFloat(p.monto||0))}</div><div style="font-size:11px">${p.vence?'Vence: '+p.vence:''}</div>
        <button class="btn-sm" style="margin-top:4px" onclick="markProvPaid('${p.id}')">Marcar pagado</button></div>
      </div>`;
    }).join('');
  }
  const tbody=document.getElementById('prov-tbody');
  if(!tbody)return;
  tbody.innerHTML=[...FIN_PROV].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')).map(p=>`
    <tr>
      <td style="color:#999;font-size:11px;white-space:nowrap">${p.fecha||'—'}</td>
      <td style="font-weight:600">${p.proveedor}</td>
      <td style="font-size:11px;color:#666;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.concepto||'—'}</td>
      <td style="font-weight:600">${fmt(parseFloat(p.monto||0))}</td>
      <td style="color:#999;font-size:11px">${p.vence||'—'}</td>
      <td>${p.status==='Pagado'?'<span class="badge b-paid">Pagado</span>':'<span class="badge b-pending">Pendiente</span>'}</td>
      <td><button class="btn-danger" onclick="deleteProv('${p.id}')">✕</button></td>
    </tr>`).join('');
}
 
window.markProvPaid=function(id){const p=FIN_PROV.find(x=>x.id===id);if(p){p.status='Pagado';finSave('prov',FIN_PROV);renderFinProv();}};
window.deleteProv=function(id){if(!confirm('¿Eliminar esta factura?'))return;FIN_PROV=FIN_PROV.filter(p=>p.id!==id);finSave('prov',FIN_PROV);renderFinProv();};
 
window.openProvModal=function(){
  const modal=document.createElement('div');modal.className='fin-modal';modal.id='prov-modal';
  modal.innerHTML=`<div class="fin-modal-box">
    <div class="fin-modal-title">Nueva cuenta por pagar</div>
    <div class="fin-row2">
      <div class="fin-field"><label>Fecha factura</label><input type="date" id="pv-fecha" value="${nowStr()}"></div>
      <div class="fin-field"><label>Estado</label><select id="pv-status"><option>Pendiente</option><option>Pagado</option></select></div>
    </div>

      <div class="fin-field"><label>N° Factura</label><input type="text" id="pv-fc" placeholder="Opcional"></div>
    </div>

window.saveProv=function(){
  const e={id:uid(),fecha:document.getElementById('pv-fecha').value,proveedor:document.getElementById('pv-prov').value.trim(),factura:document.getElementById('pv-fc').value.trim(),concepto:document.getElementById('pv-concepto').value.trim(),monto:parseFloat(document.getElementById('pv-monto').value)||0,vence:document.getElementById('pv-vence').value,status:document.getElementById('pv-status').value,notas:document.getElementById('pv-notas').value.trim()};
  if(!e.proveedor||!e.monto){alert('Proveedor y monto son requeridos');return;}
  FIN_PROV.push(e);finSave('prov',FIN_PROV);document.getElementById('prov-modal').remove();renderFinProv();
};

function renderInventario(){
  const kpisEl=document.getElementById('inv-kpis');
  const semaforoEl=document.getElementById('inv-semaforo');
  const forecastEl=document.getElementById('inv-forecast-table');
  const comprasEl=document.getElementById('inv-compras');
  if(!kpisEl)return;
  const totalStockUnits=ALL_PRODUCTS.reduce((s,p)=>s+(p.variants?.[0]?.stock||0),0);
  const outOf=ALL_PRODUCTS.filter(p=>!p.variants?.[0]?.stock).length;
  const critical=ALL_PRODUCTS.filter(p=>{const s=p.variants?.[0]?.stock;return s>0&&s<=5;}).length;
  kpisEl.innerHTML=`
    <div class="kpi"><div class="kpi-label">Total unidades en stock</div><div class="kpi-value">${fmtN(totalStockUnits)}</div><div class="kpi-sub">según TiendaNube</div></div>
    <div class="kpi"><div class="kpi-label">SKUs sin stock</div><div class="kpi-value down">${outOf}</div><div class="kpi-sub">acción urgente</div></div>
    <div class="kpi"><div class="kpi-label">SKUs críticos</div><div class="kpi-value" style="color:#E65100">${critical}</div><div class="kpi-sub">1–5 uds</div></div>
    <div class="kpi"><div class="kpi-label">Total SKUs</div><div class="kpi-value">${ALL_PRODUCTS.length}</div><div class="kpi-sub">en catálogo</div></div>`;
  const now=new Date();
  const last30=new Date(now);last30.setDate(now.getDate()-30);
  const skuSales={};
  (FILTERED_ORDERS||[]).filter(o=>o.payment_status==='paid'&&new Date(o.created_at)>=last30).forEach(o=>{(o.products||[]).forEach(it=>{const n=getName(it.name);skuSales[n]=(skuSales[n]||0)+(it.quantity||1);});});
  const avgDailySales={};Object.entries(skuSales).forEach(([n,q])=>avgDailySales[n]=q/30);
  let semaforoHtml='<div class="card"><div class="card-title">Estado de inventario por SKU</div><table class="tbl"><thead><tr><th>SKU</th><th>Stock actual</th><th>Ventas/día (30d)</th><th>Días restantes</th><th>Estado</th><th>Pedido realizado</th></tr></thead><tbody>';
  const comprasSugeridas=[];
  ALL_PRODUCTS.forEach(p=>{
    const n=getName(p.name);
    const stock=p.variants?.[0]?.stock||0;
    const daily=avgDailySales[n]||0;
    const daysLeft=daily>0?Math.round(stock/daily):999;
    const invData=FIN_INV[p.id]||{};
    let color,label,semClass;
    if(stock===0){color='#D85A30';label='Sin stock';semClass='rojo';}
    else if(daysLeft<=30){color='#EF9F27';label=daysLeft+'d — Pedir YA';semClass='amarillo';}
    else if(daysLeft<=60){color='#EF9F27';label=daysLeft+'d — Monitorear';semClass='amarillo';}
    else{color='#1D9E75';label='OK ('+daysLeft+'d)';semClass='verde';}
    if(daysLeft<=60&&stock>0)comprasSugeridas.push({name:n,stock,daily,daysLeft,suggestedQty:Math.ceil(daily*90)});
    const checked=invData.pedidoRealizado?'checked':'';
    semaforoHtml+=`<tr>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${n}</td>
      <td style="font-weight:600">${fmtN(stock)}</td>
      <td style="color:#999">${daily>0?daily.toFixed(1):'—'}</td>
      <td style="font-weight:600;color:${color}">${daily>0?daysLeft+'d':'—'}</td>
      <td><span class="semaforo ${semClass}"></span><span style="color:${color};font-size:11px">${label}</span></td>
      <td style="text-align:center"><input type="checkbox" class="inv-check" ${checked} onchange="toggleInvPedido('${p.id}',this.checked)"></td>
    </tr>`;
  });
  semaforoHtml+='</tbody></table></div>';
  if(semaforoEl)semaforoEl.innerHTML=semaforoHtml;
  let forecastHtml='<div class="card" style="overflow-x:auto"><div class="card-title">Proyección próximos 3 meses</div><table class="tbl"><thead><tr><th>SKU</th><th>Stock hoy</th><th>Mes 1</th><th>Mes 2</th><th>Mes 3</th><th>Unid. necesitar</th></tr></thead><tbody>';
  ALL_PRODUCTS.slice(0,15).forEach(p=>{
    const n=getName(p.name);
    const stock=p.variants?.[0]?.stock||0;
    const monthly=Math.round((avgDailySales[n]||0)*30);
    const m1=Math.max(0,stock-monthly),m2=Math.max(0,m1-monthly),m3=Math.max(0,m2-monthly);
    const needed=Math.max(0,monthly*3-stock);
    forecastHtml+=`<tr>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n}</td>
      <td style="font-weight:600">${fmtN(stock)}</td>
      <td style="color:${m1<10?'#D85A30':m1<30?'#EF9F27':'#1D9E75'}">${fmtN(m1)}</td>
      <td style="color:${m2<10?'#D85A30':m2<30?'#EF9F27':'#1D9E75'}">${fmtN(m2)}</td>
      <td style="color:${m3<10?'#D85A30':m3<30?'#EF9F27':'#1D9E75'}">${fmtN(m3)}</td>
      <td style="font-weight:600;color:${needed>0?'#D85A30':'#1D9E75'}">${needed>0?fmtN(needed)+' uds':'—'}</td>
    </tr>`;
  });
  forecastHtml+='</tbody></table></div>';
  if(forecastEl)forecastEl.innerHTML=forecastHtml;
  if(comprasEl){
    if(!comprasSugeridas.length){comprasEl.innerHTML='<div class="card"><div class="empty">✓ Todos los SKUs tienen stock para más de 60 días.</div></div>';}
    else{comprasEl.innerHTML=`<div class="card"><div class="card-title">SKUs para ordenar (cobertura &lt;60 días)</div><table class="tbl"><thead><tr><th>SKU</th><th>Stock actual</th><th>Días restantes</th><th>Sugerido comprar (90d)</th></tr></thead><tbody>${comprasSugeridas.sort((a,b)=>a.daysLeft-b.daysLeft).map(c=>`<tr><td style="font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}</td><td>${fmtN(c.stock)}</td><td style="font-weight:600;color:${c.daysLeft<=30?'#D85A30':'#EF9F27'}">${c.daysLeft}d</td><td style="font-weight:700;color:#185FA5">${fmtN(c.suggestedQty)} uds</td></tr>`).join('')}</tbody></table></div>`;}
  }
}
 
window.toggleInvPedido=function(pid,checked){if(!FIN_INV[pid])FIN_INV[pid]={};FIN_INV[pid].pedidoRealizado=checked;finSave('inv',FIN_INV);};

// CASH FLOW MODULE
// ═══════════════════════════════════════════════════════════
 
function renderCashFlow(){
  const months=allMonths();
  if(!FIN_CF_MONTH||!months.includes(FIN_CF_MONTH))FIN_CF_MONTH=currentMonth();
  const tabsEl=document.getElementById('cf-month-tabs');
  if(!tabsEl)return;
  tabsEl.innerHTML=months.slice(-10).map(m=>`<button class="month-tab${m===FIN_CF_MONTH?' active':''}" onclick="FIN_CF_MONTH='${m}';renderCashFlow()">${mLabel(m)}</button>`).join('');
  const b2c=b2cRevByMonth(),b2b=b2bRevByMonth(),cogs=cogsByMonth(),mktg=mktgByMonth(),opex=opexByMonth();
  const m=FIN_CF_MONTH;
  const cfData=FIN_CF[m]||{};
  const revTotal=(b2c[m]||0)+(b2b[m]||0);
  const cogsVal=cogs[m]||0,mktgVal=mktg[m]||0,opexVal=opex[m]||0;
  const ebitda=revTotal-cogsVal-mktgVal-opexVal;
  const cfExtras=cfData.extras||[];
  const cfIn=cfExtras.filter(e=>e.tipo==='ingreso').reduce((s,e)=>s+parseFloat(e.monto||0),0);
  const cfOut=cfExtras.filter(e=>e.tipo==='egreso').reduce((s,e)=>s+parseFloat(e.monto||0),0);
  const impo=parseFloat(cfData.impo||0),produccion=parseFloat(cfData.produccion||0),deuda=parseFloat(cfData.deuda||0);
  const cfNeto=ebitda+cfIn-cfOut-impo-produccion-deuda;
  const cfKpis=document.getElementById('cf-kpis');
  if(cfKpis)cfKpis.innerHTML=`
    <div class="kpi"><div class="kpi-label">Revenue</div><div class="kpi-value up">${fmt(revTotal)}</div><div class="kpi-sub">B2C + B2B</div></div>
    <div class="kpi"><div class="kpi-label">EBITDA operativo</div><div class="kpi-value ${ebitda>=0?'up':'down'}">${fmt(ebitda)}</div><div class="kpi-sub">base CF</div></div>
    <div class="kpi"><div class="kpi-label">CF Neto</div><div class="kpi-value ${cfNeto>=0?'up':'down'}">${fmt(cfNeto)}</div><div class="kpi-sub">después de impo + prod.</div></div>
    <div class="kpi"><div class="kpi-label">CxC pendiente</div><div class="kpi-value">${fmt(FIN_B2B.filter(b=>b.status==='Pendiente'&&b.fecha?.slice(0,7)===m).reduce((s,b)=>s+parseFloat(b.monto||0),0))}</div><div class="kpi-sub">B2B por cobrar</div></div>`;
  const wfEl=document.getElementById('cf-waterfall');
  if(wfEl)wfEl.innerHTML=`<div class="pl-waterfall">
    <div class="pl-row header"><span>Cash Flow — ${mLabel(m)}</span><span>ARS</span></div>
    <div class="pl-row in"><span>+ Net Sales (B2C + B2B)</span><span class="pl-val">${fmt(revTotal)}</span></div>
    <div class="pl-row out"><span>− Gastos Operativos (OPEX)</span><span class="pl-val">${fmt(opexVal)}</span></div>
    <div class="pl-row out"><span>− Marketing</span><span class="pl-val">${fmt(mktgVal)}</span></div>
    <div class="pl-row subtotal"><span>= EBITDA operativo</span><span class="pl-val" style="color:${ebitda>=0?'#1D9E75':'#D85A30'}">${fmt(ebitda)}</span></div>
    <div class="pl-row out"><span>− Producción / Impo</span><span class="pl-val"><input class="cost-input-sm" type="number" value="${cfData.produccion||''}" placeholder="0" onchange="if(!FIN_CF['${m}'])FIN_CF['${m}']={};FIN_CF['${m}'].produccion=parseFloat(this.value)||0;renderCashFlow()"></span></div>
    <div class="pl-row out"><span>− Importación</span><span class="pl-val"><input class="cost-input-sm" type="number" value="${cfData.impo||''}" placeholder="0" onchange="if(!FIN_CF['${m}'])FIN_CF['${m}']={};FIN_CF['${m}'].impo=parseFloat(this.value)||0;renderCashFlow()"></span></div>
    <div class="pl-row out"><span>± Deuda / Financiamiento</span><span class="pl-val"><input class="cost-input-sm" type="number" value="${cfData.deuda||''}" placeholder="0" onchange="if(!FIN_CF['${m}'])FIN_CF['${m}']={};FIN_CF['${m}'].deuda=parseFloat(this.value)||0;renderCashFlow()"></span></div>
    ${cfExtras.map((e,i)=>`<div class="pl-row ${e.tipo==='ingreso'?'in':'out'}"><span>${e.tipo==='ingreso'?'+':'−'} ${e.descripcion}</span><span class="pl-val">${fmt(parseFloat(e.monto||0))}<button class="btn-danger" style="margin-left:6px" onclick="deleteCFExtra('${m}',${i})">✕</button></span></div>`).join('')}
    <div class="pl-row total"><span>= CF Neto</span><span class="pl-val" style="color:${cfNeto>=0?'#1D9E75':'#D85A30'}">${fmt(cfNeto)}</span></div>
  </div>`;
  const last6=months.slice(-6);
  const cfVals=last6.map(k=>{
    const d=FIN_CF[k]||{},r=(b2c[k]||0)+(b2b[k]||0);
    const e=r-(cogs[k]||0)-(mktg[k]||0)-(opex[k]||0)-(parseFloat(d.produccion||0))-(parseFloat(d.impo||0))-(parseFloat(d.deuda||0));
    const extras=d.extras||[];
    return Math.round(e+extras.filter(x=>x.tipo==='ingreso').reduce((s,x)=>s+parseFloat(x.monto||0),0)-extras.filter(x=>x.tipo==='egreso').reduce((s,x)=>s+parseFloat(x.monto||0),0));
  });
  mkChart('chartCF','bar',last6.map(mLabel),[{data:cfVals,backgroundColor:cfVals.map(v=>v>=0?'#1D9E75':'#D85A30'),borderRadius:4}],{scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},callback:tickY}}}});
  const detailEl=document.getElementById('cf-detail');
  if(detailEl){
    const allExtras=cfExtras.map((e,i)=>({...e,idx:i}));
    detailEl.innerHTML=allExtras.length===0?'<div class="card"><div class="empty">Sin movimientos manuales para este mes.</div></div>':`<div class="card"><table class="tbl"><thead><tr><th>Tipo</th><th>Descripción</th><th>Monto</th><th></th></tr></thead><tbody>${allExtras.map(e=>`<tr><td>${e.tipo==='ingreso'?'<span class="badge b-paid">Ingreso</span>':'<span class="badge b-cancelled">Egreso</span>'}</td><td>${e.descripcion}</td><td style="font-weight:600;color:${e.tipo==='ingreso'?'#1D9E75':'#D85A30'}">${fmt(parseFloat(e.monto||0))}</td><td><button class="btn-danger" onclick="deleteCFExtra('${m}',${e.idx})">✕</button></td></tr>`).join('')}</tbody></table></div>`;
  }
}
 
window.deleteCFExtra=function(month,idx){if(!FIN_CF[month]?.extras)return;FIN_CF[month].extras.splice(idx,1);finSave('cf',FIN_CF);renderCashFlow();};
window.saveCF=function(){finSave('cf',FIN_CF);alert('Cash Flow guardado ✓');};
 
window.openCFModal=function(){
  const modal=document.createElement('div');modal.className='fin-modal';modal.id='cf-modal';
  const m=FIN_CF_MONTH||currentMonth();
  modal.innerHTML=`<div class="fin-modal-box">
    <div class="fin-modal-title">Agregar movimiento — ${mLabel(m)}</div>
    <div class="fin-row2">
      <div class="fin-field"><label>Tipo</label><select id="cf-tipo"><option value="ingreso">Ingreso</option><option value="egreso">Egreso</option></select></div>
      <div class="fin-field"><label>Monto ARS</label><input type="number" id="cf-monto" placeholder="0" min="0"></div>
    </div>
    <div class="fin-field"><label>Descripción</label><input type="text" id="cf-desc" placeholder="Ej: Cobro cliente, Pago proveedor..."></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">
      <button class="btn-secondary" onclick="document.getElementById('cf-modal').remove()">Cancelar</button>
      <button class="btn-primary" onclick="saveCFExtra('${m}')">Guardar</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
};
 
window.saveCFExtra=function(m){
  const tipo=document.getElementById('cf-tipo').value;
  const monto=parseFloat(document.getElementById('cf-monto').value)||0;
  const descripcion=document.getElementById('cf-desc').value.trim();
  if(!descripcion||!monto){alert('Descripción y monto requeridos');return;}
  if(!FIN_CF[m])FIN_CF[m]={};
  if(!FIN_CF[m].extras)FIN_CF[m].extras=[];
  FIN_CF[m].extras.push({tipo,monto,descripcion});
  finSave('cf',FIN_CF);
  document.getElementById('cf-modal').remove();
  renderCashFlow();
};
 
function renderFinances(){
  renderFinPL();
  renderFinB2B();
  renderFinGastos();
  renderFinMktg();
  renderFinCostos();
  renderFinProv();
}
